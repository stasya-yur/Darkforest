<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkForest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="abbs.css">
</head>
<body>
    <header>
        <a href="index.html"><div class="header-title">Темний Ліс</div></a>
        <a href="snarl.html"><div class="block">Плутанина</div></a>
        <a href="abbs.html"><div class="block active">Абревіатури</div></a>
        <a href="https://kahoot.com/"><div class="block">Kahoot!</div></a>
        <a href="https://garticphone.com/uk"><div class="block">Gartic Phone</div></a>
        <a href="https://smashkarts.io/"><div class="block">Smash Carts</div></a>
        <a href="https://makeitmeme.com/"><div class="block">Make It Meme</div></a>
    </header>
    <main>
        <div class="game-container">
            <div class="game-main">
                <div class="word">Слово</div>
                <div class="buttons">
                    <button class="next-word">Веперед</button>
                </div>
            </div>
            <div class="game-settings">
                <div class="setting-section">
                    <div class="options-group">
                        <input type="radio" name="level" id="low" value="easy" checked>
                        <label for="low">Початківці</label>
            
                        <input type="radio" name="level" id="mid" value="medium">
                        <label for="mid">Середньо</label>
            
                        <input type="radio" name="level" id="high" value="hard">
                        <label for="high">Складно</label>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="abbs.js"></script>
</body>
</html>
